from IPython.display import HTML

html_code = """
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --field-color: #2e7d32; --line-color: #ffffff; --player-color: #1565c0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; }
        .header { display: flex; gap: 15px; margin-bottom: 20px; }
        .header input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 15px; font-size: 14px; border: none; border-radius: 4px; background-color: #e0e0e0; cursor: pointer; }
        button.active { background-color: #4caf50; color: white; font-weight: bold; }
        button:hover { background-color: #bdbdbd; }
        button.active:hover { background-color: #43a047; }
        
        .field-container {
            position: relative; width: 100%; height: 400px; background-color: var(--field-color);
            border: 2px solid var(--line-color); border-radius: 4px; overflow: hidden; margin-bottom: 20px;
            background-image: repeating-linear-gradient(to right, transparent, transparent 49.5%, var(--line-color) 49.5%, var(--line-color) 50.5%);
            background-size: 10% 100%;
        }
        #drawing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; }
        .player {
            position: absolute; width: 30px; height: 30px; background-color: var(--player-color); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;
            font-weight: bold; user-select: none; z-index: 20; cursor: grab; border: 2px solid #fff; transform: translate(-50%, -50%);
        }
        .assignments { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .assignment-box { display: flex; flex-direction: column; }
        .assignment-box label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .assignment-box textarea { height: 60px; resize: vertical; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <input type="text" placeholder="隊形名 (例: Shotgun Spread)">
        <input type="text" placeholder="サイン名 (例: Mesh Cross)">
    </div>

    <div class="toolbar">
        <button id="btn-move" class="active" onclick="setMode('move')">選手を移動する</button>
        <button id="btn-draw" onclick="setMode('draw')">ルートを描く</button>
        <button onclick="clearCanvas()">線を消す</button>
    </div>

    <div class="field-container" id="field">
        <canvas id="drawing-canvas"></canvas>
        <div class="player" style="left: 50%; top: 50%;">C</div><div class="player" style="left: 45%; top: 50%;">LG</div>
        <div class="player" style="left: 55%; top: 50%;">RG</div><div class="player" style="left: 40%; top: 50%;">LT</div>
        <div class="player" style="left: 60%; top: 50%;">RT</div><div class="player" style="left: 50%; top: 60%;">QB</div>
        <div class="player" style="left: 50%; top: 75%;">RB</div><div class="player" style="left: 65%; top: 50%;">TE</div>
        <div class="player" style="left: 20%; top: 50%;">WR1</div><div class="player" style="left: 80%; top: 50%;">WR2</div>
        <div class="player" style="left: 10%; top: 50%;">WR3</div>
    </div>

    <h3>ポジションごとの動き（アサイメント）</h3>
    <div class="assignments" id="assignments-container"></div>
</div>

<script>
    let currentMode = 'move';
    let isDrawing = false;
    const canvas = document.getElementById('drawing-canvas');
    const ctx = canvas.getContext('2d');
    const field = document.getElementById('field');

    function resizeCanvas() { canvas.width = field.clientWidth; canvas.height = field.clientHeight; }
    setTimeout(resizeCanvas, 100); // Wait for render

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btn-move').classList.toggle('active', mode === 'move');
        document.getElementById('btn-draw').classList.toggle('active', mode === 'draw');
        canvas.style.pointerEvents = mode === 'draw' ? 'auto' : 'none';
    }
    canvas.style.pointerEvents = 'none';

    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
    }

    function startDrawing(e) {
        if (currentMode !== 'draw') return;
        isDrawing = true;
        const pos = getPointerPos(e);
        ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        ctx.strokeStyle = '#ffff00'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        e.preventDefault();
    }
    function draw(e) {
        if (!isDrawing || currentMode !== 'draw') return;
        const pos = getPointerPos(e);
        ctx.lineTo(pos.x, pos.y); ctx.stroke();
        e.preventDefault();
    }
    function stopDrawing() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('mouseout', stopDrawing);
    
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    let draggedPlayer = null, offsetX = 0, offsetY = 0;
    document.querySelectorAll('.player').forEach(p => p.addEventListener('mousedown', startDrag));

    function startDrag(e) {
        if (currentMode !== 'move') return;
        draggedPlayer = e.target;
        const rect = draggedPlayer.getBoundingClientRect();
        offsetX = e.clientX - (rect.left + rect.width / 2);
        offsetY = e.clientY - (rect.top + rect.height / 2);
        e.preventDefault();
    }
    document.addEventListener('mousemove', e => {
        if (!draggedPlayer || currentMode !== 'move') return;
        const rect = field.getBoundingClientRect();
        let x = Math.max(15, Math.min(e.clientX - rect.left - offsetX, rect.width - 15));
        let y = Math.max(15, Math.min(e.clientY - rect.top - offsetY, rect.height - 15));
        draggedPlayer.style.left = (x / rect.width * 100) + '%';
        draggedPlayer.style.top = (y / rect.height * 100) + '%';
        e.preventDefault();
    });
    document.addEventListener('mouseup', () => draggedPlayer = null);

    const positions = ['C', 'LG', 'RG', 'LT', 'RT', 'QB', 'RB', 'TE', 'WR1', 'WR2', 'WR3'];
    const container = document.getElementById('assignments-container');
    positions.forEach(pos => {
        container.innerHTML += `<div class="assignment-box"><label>${pos}</label><textarea placeholder="${pos} の動き"></textarea></div>`;
    });
</script>
</body>
</html>
"""

display(HTML(html_code))
